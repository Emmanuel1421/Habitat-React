services:
  backend:
    build: ./app
    container_name: habitat-api
    ports:
      - "8080:8080"
    volumes:
      - ~/.m2:/root/.m2
    working_dir: /app
    command: sh -c "chmod +x mvnw && ./mvnw spring-boot:run"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://habitat-database:5432/habitat
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      API_SECRET_TOKEN: ${API_SECRET_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
    depends_on:
      - habitat-database

  habitat-database:
    image: postgres:17
    container_name: habitat-database
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: habitat
    ports:
      - "5432:5432"